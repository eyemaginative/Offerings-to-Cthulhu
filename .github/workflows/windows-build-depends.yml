name: Build Windows Qt5 wallet (depends/ cross-compile)

# Canonical Bitcoin Core depends/ cross-compile path. Runs on Linux,
# uses mingw-w64 to cross-compile to Windows x86_64. depends/ builds
# Boost/Qt5/OpenSSL/BDB/protobuf/qrencode from pinned source — controls
# all dependency versions so we avoid MSYS2-style API drift.
#
# Parallel path to .github/workflows/windows-build.yml (MSYS2 approach).
# Triggers: push to main when this file or depends/ changes, manual dispatch,
# tag push (attaches to release).

on:
  push:
    branches: [ main, master ]
    paths:
      - '.github/workflows/windows-build-depends.yml'
      - 'depends/**'
      - 'configure.ac'
      - 'src/**'
    tags: [ 'v*', 'wallet-*' ]
  workflow_dispatch:

jobs:
  windows-cross:
    name: Cthulhu Offerings — Windows x86_64 (depends/ cross)
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install build deps + mingw-w64 toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libtool autotools-dev automake autoconf pkg-config \
            bsdmainutils python3 curl ca-certificates faketime bison \
            g++-mingw-w64-x86-64 mingw-w64-x86-64-dev nsis
          # Use POSIX-thread variant (required for Qt5 / C++ threads)
          sudo update-alternatives --set x86_64-w64-mingw32-g++ /usr/bin/x86_64-w64-mingw32-g++-posix
          sudo update-alternatives --set x86_64-w64-mingw32-gcc /usr/bin/x86_64-w64-mingw32-gcc-posix

      - name: Cache depends/ sources + built artifacts
        id: cache-depends
        uses: actions/cache@v4
        with:
          path: |
            depends/sources
            depends/built
            depends/x86_64-w64-mingw32
            depends/work
          # Cache invalidates if any .mk file changes (version pins or build recipes).
          # Distro is part of the key — depends/ builds host-native helpers (ccache, qmake,
          # protoc) that link against the runner's glibc; a cache built on Noble (glibc 2.38)
          # won't execute on Jammy (glibc 2.35). Bump the version suffix to invalidate.
          key: depends-x86_64-w64-mingw32-jammy-v1-${{ hashFiles('depends/packages/*.mk', 'depends/Makefile', 'depends/funcs.mk') }}
          restore-keys: |
            depends-x86_64-w64-mingw32-jammy-v1-

      - name: Inventory depends/ state
        run: |
          echo "=== depends/ contents ==="
          ls depends/ 2>&1 | head -30
          echo
          echo "=== depends/packages/ ==="
          ls depends/packages/ 2>&1 | head -30
          echo
          echo "=== cache hit? ==="
          [ -d depends/x86_64-w64-mingw32 ] && echo "depends/x86_64-w64-mingw32 present (cache hit)" || echo "no cache, will build from scratch"

      - name: Build depends/ for x86_64-w64-mingw32
        run: |
          cd depends
          # Bitcoin Core depends/ supports NO_QT, NO_UPNP, NO_ZMQ flags. We want Qt for the GUI wallet.
          # First run is slow (~1-2 hr). Subsequent runs are cached.
          make HOST=x86_64-w64-mingw32 -j$(nproc) NO_UPNP=1 || {
            echo "=== depends/ build failed — last 80 lines ==="
            tail -80 depends/work/build/x86_64-w64-mingw32/*/build.log 2>/dev/null || true
            exit 1
          }
          echo "=== depends/ output ==="
          ls x86_64-w64-mingw32/lib/ 2>&1 | head -20
          ls x86_64-w64-mingw32/include/ 2>&1 | head -10

      - name: Materialize Qt host tools at expected build path
        run: |
          # depends/ cache restores Qt install but discards work/build dir.
          # OFF's pre-generated qmake config embeds qt/X.Y.Z-HASH/qtbase/bin/
          # for rcc/uic/moc/lupdate. Recreate that dir and symlink from native install.
          # MUST run BEFORE autogen+configure because configure invokes qmake.
          NATIVE=$PWD/depends/x86_64-w64-mingw32/native/bin
          echo "=== native bin ==="
          ls -la $NATIVE/ 2>&1 | grep -E "rcc|uic|moc|lupdate|lrelease|lconvert|qmake" || true
          # Find the qt hash dir (deterministic from qt.mk hash)
          QT_HASH_DIR=$(ls -d depends/work/build/x86_64-w64-mingw32/qt/5.12.11-* 2>/dev/null | head -1)
          if [ -z "$QT_HASH_DIR" ]; then
            # Compute the expected hash dir name by inspecting the qt.mk recipe hash
            # If still empty, fall back to known dir from prior logs
            QT_HASH_DIR="depends/work/build/x86_64-w64-mingw32/qt/5.12.11-bbbdca62463"
          fi
          echo "Materializing host tools in $QT_HASH_DIR/qtbase/bin/"
          mkdir -p "$QT_HASH_DIR/qtbase/bin"
          for tool in rcc moc uic lupdate lrelease lconvert qmake; do
            if [ -f "$NATIVE/${tool}-qt5" ]; then
              ln -sf "$NATIVE/${tool}-qt5" "$QT_HASH_DIR/qtbase/bin/$tool"
            elif [ -f "$NATIVE/${tool}" ]; then
              ln -sf "$NATIVE/${tool}" "$QT_HASH_DIR/qtbase/bin/$tool"
            fi
          done
          ls -la "$QT_HASH_DIR/qtbase/bin/"

      - name: autogen + configure
        run: |
          ./autogen.sh
          # CONFIG_SITE is the bridge: tells configure to use the depends/ tree.
          DEPENDS_PREFIX=$PWD/depends/x86_64-w64-mingw32
          # native/bin holds protoc and other build-host tools built by depends/
          PATH="${DEPENDS_PREFIX}/native/bin:${PATH}" \
          CONFIG_SITE=$DEPENDS_PREFIX/share/config.site \
          CPPFLAGS="-I${DEPENDS_PREFIX}/include" \
          LDFLAGS="-L${DEPENDS_PREFIX}/lib -L${DEPENDS_PREFIX}/plugins/platforms -L${DEPENDS_PREFIX}/plugins/accessible -L${DEPENDS_PREFIX}/plugins/imageformats -L${DEPENDS_PREFIX}/plugins/styles" \
          PKG_CONFIG_PATH="${DEPENDS_PREFIX}/lib/pkgconfig" \
          CXXFLAGS="-std=gnu++14 -Wa,-mbig-obj" \
            ./configure \
              --prefix=/ \
              --host=x86_64-w64-mingw32 \
              --build=x86_64-pc-linux-gnu \
              --disable-tests \
              --disable-bench \
              --with-boost=${DEPENDS_PREFIX} \
              --with-qt-incdir=${DEPENDS_PREFIX}/include \
              --with-qt-libdir=${DEPENDS_PREFIX}/lib \
              --with-qt-plugindir=${DEPENDS_PREFIX}/plugins \
              --with-qt-bindir=${DEPENDS_PREFIX}/native/bin \
              || { echo "=== config.log tail ==="; tail -300 config.log; exit 1; }

      - name: Pre-build LevelDB (generate build_config.mk)
        run: |
          # Parallel make races on $(shell ./build_detect_platform); pre-build
          # leveldb sequentially so build_config.mk exists before main make.
          cd src/leveldb
          TARGET_OS=OS_WINDOWS_CROSSCOMPILE \
          CC=x86_64-w64-mingw32-gcc \
          CXX=x86_64-w64-mingw32-g++ \
          AR=x86_64-w64-mingw32-ar \
            ./build_detect_platform build_config.mk ./
          ls -la build_config.mk
          head -5 build_config.mk

      - name: make
        run: make -j$(nproc) || { echo "=== make failed ==="; exit 1; }

      - name: Verify binaries
        run: |
          file src/Offeringsd src/Offerings-cli src/qt/Offerings-qt 2>&1 | head -10
          ls -la src/Offeringsd* src/Offerings-cli* src/qt/Offerings-qt* 2>&1 | head

      - name: Strip + package
        run: |
          # The .exe suffix is added automatically by the cross-build
          BIN_D=src/Offeringsd.exe
          BIN_C=src/Offerings-cli.exe
          BIN_Q=src/qt/Offerings-qt.exe
          # Fallback if no .exe suffix (some configs)
          [ -f "$BIN_D" ] || BIN_D=src/Offeringsd
          [ -f "$BIN_C" ] || BIN_C=src/Offerings-cli
          [ -f "$BIN_Q" ] || BIN_Q=src/qt/Offerings-qt
          x86_64-w64-mingw32-strip --strip-all "$BIN_D" "$BIN_C" "$BIN_Q"
          mkdir -p dist
          cp "$BIN_D" dist/Offeringsd.exe
          cp "$BIN_C" dist/Offerings-cli.exe
          cp "$BIN_Q" dist/Offerings-qt.exe
          cd dist
          sha256sum *.exe > SHA256SUMS
          tar czf ../offerings-cthulhu-wallet-windows-x86_64-qt5.tar.gz *.exe SHA256SUMS
          cd ..
          ls -la offerings-cthulhu-wallet-windows-x86_64-qt5.tar.gz dist/SHA256SUMS
          cat dist/SHA256SUMS

      - name: Upload Windows Qt5 artifact
        uses: actions/upload-artifact@v4
        with:
          name: cthulhu-offerings-windows-x86_64-qt5
          path: |
            offerings-cthulhu-wallet-windows-x86_64-qt5.tar.gz
            dist/SHA256SUMS
          retention-days: 90

