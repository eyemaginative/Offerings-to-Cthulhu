name: Build Windows wallet (MSYS2 / mingw64)

# Native MSYS2 + mingw64 build on GitHub's Windows runners.
# Sidesteps the missing `depends/` system in this fork — uses MSYS2 packages
# for Boost, OpenSSL, Qt5, protobuf, qrencode, BDB instead.
#
# Triggers: every push to main, every PR, and manual workflow_dispatch.

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*', 'wallet-*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  windows-mingw64:
    name: Cthulhu Offerings (Windows x86_64)
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up MSYS2 + mingw64 toolchain
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            autoconf
            automake
            libtool
            pkg-config
            git
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-make
            mingw-w64-x86_64-boost
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-qt5-base
            mingw-w64-x86_64-qt5-tools
            mingw-w64-x86_64-qt5-translations
            mingw-w64-x86_64-protobuf
            mingw-w64-x86_64-qrencode
            mingw-w64-x86_64-db

      - name: Set up Boost.Bind placeholders compatibility header
        run: |
          cat > $HOME/boost_bind_compat.h <<'EOF'
          #pragma once
          #include <boost/bind/bind.hpp>
          using namespace boost::placeholders;
          EOF

      - name: Cache OpenSSL 1.0.2u build
        id: cache-openssl
        uses: actions/cache@v4
        with:
          path: C:\msys64\home\runneradmin\openssl-1.0.2
          key: openssl-1.0.2u-mingw64-v1

      - name: Build OpenSSL 1.0.2u (if not cached)
        if: steps.cache-openssl.outputs.cache-hit != 'true'
        run: |
          # OFF's bignum.h subclasses BIGNUM. OpenSSL 1.1+ made BIGNUM opaque,
          # breaking this. MSYS2 ships OpenSSL 3.6.2. Build OpenSSL 1.0.2u
          # locally to satisfy the source. Same approach used by the Linux build
          # (see offerings-build-recipe.md memory). ~5min compile, then cached.
          set -e
          cd $HOME
          # openssl.org has reorganized; use the GitHub releases mirror.
          curl -fsSL https://github.com/openssl/openssl/releases/download/OpenSSL_1_0_2u/openssl-1.0.2u.tar.gz -o openssl-1.0.2u.tar.gz
          ls -la openssl-1.0.2u.tar.gz
          tar xzf openssl-1.0.2u.tar.gz
          cd openssl-1.0.2u
          # no-asm: avoid asm files that don't assemble cleanly on gcc 16.
          # -Wno-error: gcc 16 promotes a host of OpenSSL-1.0.2 warnings to errors.
          # (Cannot use no-engine: rsa_lib.c hard-deps openssl/engine.h.)
          ./Configure mingw64 no-shared no-dso no-asm \
            --prefix=$HOME/openssl-1.0.2 \
            -Wno-error -Wno-incompatible-pointer-types -Wno-deprecated-declarations -Wno-discarded-qualifiers
          make -j2 build_libs
          # OpenSSL 1.0.2 has no install_dev target. Manual install: just copy
          # libs + headers; that is all OFF needs.
          mkdir -p $HOME/openssl-1.0.2/lib $HOME/openssl-1.0.2/include/openssl
          cp libcrypto.a libssl.a $HOME/openssl-1.0.2/lib/
          cp -r include/openssl/*.h $HOME/openssl-1.0.2/include/openssl/
          ls $HOME/openssl-1.0.2/lib/ $HOME/openssl-1.0.2/include/openssl/ | head -20

      - name: Patch source for Boost 1.91 compat
        run: |
          set -e
          # Boost removed: io_service (use io_context), io_service::work (use
          # executor_work_guard), resolver::query, resolver::iterator. Patch
          # source to use modern APIs.

          # 1. Rewrite rpcprotocol.h:connect() entirely — resolver API was redesigned.
          python3 - <<'PYEOF'
          path = 'src/rpcprotocol.h'
          src = open(path).read()
          old = '''    bool connect(const std::string& server, const std::string& port)
              {
                  boost::asio::ip::tcp::resolver resolver(static_cast<boost::asio::io_service&>(stream.lowest_layer().get_executor().context()));
                  boost::asio::ip::tcp::resolver::query query(server.c_str(), port.c_str());
                  boost::asio::ip::tcp::resolver::iterator endpoint_iterator = resolver.resolve(query);
                  boost::asio::ip::tcp::resolver::iterator end;
                  boost::system::error_code error = boost::asio::error::host_not_found;
                  while (error && endpoint_iterator != end)
                  {
                      stream.lowest_layer().close();
                      stream.lowest_layer().connect(*endpoint_iterator++, error);
                  }
                  if (error)
                      return false;
                  return true;
              }'''
          new = '''    bool connect(const std::string& server, const std::string& port)
              {
                  boost::asio::ip::tcp::resolver resolver(stream.lowest_layer().get_executor());
                  boost::system::error_code error = boost::asio::error::host_not_found;
                  try {
                      auto endpoints = resolver.resolve(server, port);
                      for (const auto& ep : endpoints) {
                          stream.lowest_layer().close();
                          stream.lowest_layer().connect(ep, error);
                          if (!error) break;
                      }
                  } catch (const boost::system::system_error&) {
                      return false;
                  }
                  return !error;
              }'''
          # Tolerate whitespace differences:
          import re
          def norm(s): return re.sub(r'\s+', ' ', s).strip()
          src_norm = norm(src)
          if norm(old) in src_norm:
              # Reconstruct: find old block tolerating whitespace and replace verbatim
              pat = re.escape(old).replace(r'\ ', r'\s+')
              src = re.sub(pat, new, src, count=1)
              open(path, 'w').write(src)
              print('OK: rewrote connect() in rpcprotocol.h')
          else:
              print('ERROR: connect() block not found in expected form')
              raise SystemExit(1)
          PYEOF

          # 2. rpcserver.cpp: get_executor().context() → drop .context() (Boost 1.91 removed it),
          #    pass executor directly to constructors that accept it.
          sed -i 's|static_cast<boost::asio::io_service&>(acceptor->get_executor().context())|*rpc_io_service|g' src/rpcserver.cpp

          # 3. io_service::work → executor_work_guard<io_context::executor_type>
          for f in src/rpcserver.cpp src/rpcclient.cpp; do
            sed -i 's|asio::io_service::work \*|asio::executor_work_guard<asio::io_context::executor_type> *|g' "$f"
            sed -i 's|new asio::io_service::work(\*rpc_io_service)|new asio::executor_work_guard<asio::io_context::executor_type>(rpc_io_service->get_executor())|g' "$f"
          done

          # 4. io_service → io_context (do this LAST so earlier patterns still match)
          for f in src/rpcserver.cpp src/rpcclient.cpp src/rpcprotocol.h; do
            sed -i 's|boost::asio::io_service\b|boost::asio::io_context|g' "$f"
            sed -i 's|\basio::io_service\b|asio::io_context|g' "$f"
          done

          echo '--- remaining io_service references (should be 0) ---'
          grep -c 'io_service' src/rpcserver.cpp src/rpcclient.cpp src/rpcprotocol.h || true

          # 5. Boost.Filesystem: basename()/extension() free functions removed in
          # Boost 1.91; use path::stem() / path::extension() member methods.
          for f in src/init.cpp src/util.cpp src/main.cpp src/wallet.cpp src/walletdb.cpp; do
            [ -f "$f" ] || continue
            sed -i -E 's|boost::filesystem::basename\(([^)]+)\)|(\1).stem().string()|g' "$f"
            sed -i -E 's|boost::filesystem::extension\(([^)]+)\)|(\1).extension().string()|g' "$f"
          done

          echo '--- remaining filesystem::basename/extension (should be 0) ---'
          grep -c 'filesystem::basename\|filesystem::extension' src/*.cpp src/*.h 2>/dev/null | grep -v ':0$' | head -10 || true
          echo '--- modified file checksums ---'
          md5sum src/rpcserver.cpp src/rpcclient.cpp src/rpcprotocol.h src/init.cpp 2>/dev/null

      - name: Patch broken AC_CHECK_LIB(Qt5, main) checks
        run: |
          # OFF's bitcoin_qt.m4 manually probes -lQt5{Core,Gui,Network} with
          # AC_CHECK_LIB using main as the function. AC_CHECK_LIB uses the C
          # compiler by default; Qt5 libs are C++ — symbol mangling means the
          # link test always fails. pkg-config already validated Qt5 at this
          # point (line ~315 of bitcoin_qt.m4), so these manual checks are
          # redundant. Comment them out so autogen regenerates a working
          # configure.
          set -e
          # Replace BITCOIN_QT_CHECK(AC_CHECK_LIB(...)) with BITCOIN_QT_CHECK([:]) — a no-op
          # shell command. Using dnl would leave empty if/fi blocks (invalid shell).
          sed -i -E 's|^([[:space:]]*)BITCOIN_QT_CHECK\(AC_CHECK_LIB\([^)]*\)[^)]*\)\)|\1BITCOIN_QT_CHECK([:])|g' src/m4/bitcoin_qt.m4
          # Plain AC_CHECK_LIB([${QT_LIB_PREFIX}...]) lines (QtTest/QtDBus) are not inside
          # if/fi blocks so dnl-ing is safe.
          sed -i -E 's|^([[:space:]]*)AC_CHECK_LIB\(\[\$\{QT_LIB_PREFIX\}|\1dnl AC_CHECK_LIB([${QT_LIB_PREFIX}|g' src/m4/bitcoin_qt.m4
          echo "--- patched lines ---"
          grep -nE "(BITCOIN_QT_CHECK\(\[:\]\)|dnl AC_CHECK_LIB)" src/m4/bitcoin_qt.m4 | head -15

      - name: autogen
        run: ./autogen.sh

      - name: Diagnose toolchain
        run: |
          set +e
          echo "PATH=$PATH"
          which gcc g++ ld ar
          gcc --version | head -1
          g++ --version | head -1
          echo "--- hello world test ---"
          echo 'int main(){return 0;}' > /tmp/hello.cpp
          g++ /tmp/hello.cpp -o /tmp/hello.exe && echo "BASIC LINK OK" || echo "BASIC LINK FAIL"
          echo "--- boost layout ---"
          ls /mingw64/include/boost/version.hpp
          ls /mingw64/lib/libboost_*.a /mingw64/lib/libboost_*.dll.a 2>&1 | head -20
          echo "--- qt5 ---"
          which qmake qmake-qt5 moc uic rcc lrelease lrelease-qt5 lupdate
          ls /mingw64/lib/libQt5*.dll.a 2>&1 | head -5
          echo "--- qt5 include layout ---"
          ls -d /mingw64/include/QtCore /mingw64/include/qt5/QtCore /mingw64/include/QtCore/QtCore 2>&1
          /mingw64/bin/qmake-qt5 -query QT_INSTALL_HEADERS QT_INSTALL_LIBS QT_INSTALL_BINS 2>&1
          echo "--- pkg-config for Qt5 ---"
          pkg-config --exists Qt5Core && echo "Qt5Core pkg-config: OK" || echo "Qt5Core pkg-config: MISSING"
          pkg-config --cflags Qt5Core 2>&1
          echo "(diagnose end; never fails the job)"

      - name: Stub header-only boost libs
        run: |
          # MSYS2 Boost 1.91 dropped libboost_system (it's been header-only since 1.69).
          # Bitcoin Core 0.10's autoconf still probes for -lboost_system. Provide
          # empty stub archives so AX_BOOST_SYSTEM finds something to link against.
          set -e
          cd /mingw64/lib
          if [ ! -e libboost_system-mt.a ]; then
            echo "" > /tmp/empty.c
            gcc -c /tmp/empty.c -o /tmp/empty.o
            for suffix in '-mt.a' '-mt.dll.a' '.a' '.dll.a'; do
              [ -e "libboost_system${suffix}" ] || ar rcs "libboost_system${suffix}" /tmp/empty.o
            done
            echo "Stubbed boost_system at /mingw64/lib/libboost_system{-mt,}{,.dll}.a"
          else
            echo "boost_system already present, no stub needed"
          fi
          ls libboost_system* 2>&1

      - name: configure
        env:
          CC: gcc
          CXX: g++
        run: |
          # Point at local OpenSSL 1.0.2 ahead of system OpenSSL 3.x.
          export CPPFLAGS="-I$HOME/openssl-1.0.2/include $CPPFLAGS"
          export LDFLAGS="-L$HOME/openssl-1.0.2/lib $LDFLAGS"
          export PKG_CONFIG_PATH="$HOME/openssl-1.0.2/lib/pkgconfig:$PKG_CONFIG_PATH"
          export CXXFLAGS="-std=c++11 -Wno-error -O2 -g -include $HOME/boost_bind_compat.h"
          export CFLAGS="-Wno-error -O2 -g"
          ./configure \
            --with-gui=qt5 \
            --disable-tests \
            --without-miniupnpc \
            --with-incompatible-bdb \
            --with-boost-libdir=/mingw64/lib \
            --with-boost=/mingw64 \
            --with-qt-incdir=/mingw64/include \
            --with-qt-libdir=/mingw64/lib \
            --with-qt-bindir=/mingw64/bin \
            --with-qt-plugindir=/mingw64/share/qt5/plugins \
            --with-qt-translationdir=/mingw64/share/qt5/translations \
            || { echo '=== config.log tail ==='; tail -200 config.log; exit 1; }

      - name: make
        run: make -j2

      - name: Strip binaries
        run: strip --strip-all src/Offeringsd.exe src/Offerings-cli.exe src/qt/Offerings-qt.exe

      - name: Package Windows binaries
        run: |
          mkdir -p dist
          cp src/Offeringsd.exe dist/
          cp src/Offerings-cli.exe dist/
          cp src/qt/Offerings-qt.exe dist/
          cd dist && sha256sum *.exe > SHA256SUMS
          tar czf ../offerings-cthulhu-wallet-windows-x86_64.tar.gz *.exe SHA256SUMS

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cthulhu-offerings-windows-x86_64
          path: |
            offerings-cthulhu-wallet-windows-x86_64.tar.gz
            dist/SHA256SUMS
          retention-days: 90

      - name: Attach to release (if tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            offerings-cthulhu-wallet-windows-x86_64.tar.gz
            dist/SHA256SUMS
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
